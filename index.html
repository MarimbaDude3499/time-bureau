<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TIME BUREAU | COMMAND CENTER</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #050505;
            color: #1aff1a;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            overflow: hidden;
        }

        /* The Game Window */
        #game-container {
            flex-grow: 1;
            border-right: 2px solid #1aff1a;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
        }

        /* The Persistent Sidebar */
        #sidebar {
            width: 300px;
            background: rgba(0, 20, 0, 0.9);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(26, 255, 26, 0.1);
        }

        .sidebar-header {
            font-weight: bold;
            border-bottom: 2px solid #1aff1a;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .patch-section {
            background: rgba(26, 255, 26, 0.05);
            padding: 15px;
            border: 1px solid #1aff1a;
        }

        input {
            background: #000;
            border: 1px solid #1aff1a;
            color: #1aff1a;
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }

        button {
            background: #1aff1a;
            color: #000;
            border: none;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #reward-box {
            margin-top: 20px;
            font-size: 0.8em;
            color: #00ffff; /* Cyber Blue for rewards */
        }

        .unlocked { color: #ff00ff !important; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <iframe src="game.html"></iframe>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">AGENT HUB v1.0</div>
        
        <div class="patch-section">
            <label>ENTER PATCH CODE:</label>
            <input type="text" id="codeInput" placeholder="EX: BULL-1929">
            <button onclick="checkCode()">SUBMIT CODE</button>
        </div>

        <div id="reward-box">
            <p>ACTIVE PATCHES:</p>
            <ul id="patch-list" style="list-style: none; padding: 0;">
                <li id="code1">????-????</li>
                <li id="code2">????-????</li>
                <li id="code3">????-????</li>
                <li id="code4">????-????</li>
                <li id="code5">????-????</li>
                <li id="code6">????-????</li>
            </ul>
        </div>
    </div>

<script>
    // These match the codes in your Twine game
    const validCodes = {
        "BULL-1929": "code1",
        "FREEDOM-1863": "code2",
        "WISDOM-1258": "code3",
        "OZONE-1921": "code4",
        "PLAINS-1930": "code5",
        "SOVEREIGN-1884": "code6"
    };

    let unlockedCount = 0;

    function checkCode() {
        const input = document.getElementById('codeInput').value.toUpperCase();
        const feedback = document.getElementById('patch-list');
        
        if (validCodes[input]) {
            const element = document.getElementById(validCodes[input]);
            if (!element.classList.contains('unlocked')) {
                element.innerText = "✓ " + input;
                element.classList.add('unlocked');
                unlockedCount++;
                document.getElementById('codeInput').value = "";
                
                // CHECK FOR CONGRATULATIONS
                if (unlockedCount === 6) {
                    alert("CONGRATULATIONS AGENT! TIMELINE STABILIZED. ACCESS GRANTED TO TOP SECRET ARCHIVE.");
                    window.location.href = "archive.html"; // Takes them to your secret page!
                }
            } else {
                alert("CODE ALREADY LOGGED.");
            }
        } else {
            alert("INVALID PATCH CODE. CHECK YOUR TWINE RESULTS.");
        }
    }
</script>

</body>
</html>
